name: Branch Deploy

on:
  push:
    branches:
      - ana-https
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, users, gateway, authentication]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  deploy:
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Remove local-only certs before upload
        run: |
          rm -f nginx/certs/fullchain.pem || true
          rm -f nginx/certs/privkey.pem || true

      - name: Upload project to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "."
          target: "${{ secrets.DEPLOY_PATH }}"
          rm: true
          strip_components: 0

      - name: Start app on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            mkdir -p nginx/certs

            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRES=${{ secrets.JWT_EXPIRES }}" >> .env

            docker compose down || true
            docker compose up -d --build