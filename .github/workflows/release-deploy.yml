name: Release — Test, Build, Publish, Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, users, gateway, authentication, botapi, multiplayer]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install users dependencies
        run: |
          cd users
          npm ci
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Install authentication dependencies
        run: |
          cd authentication
          npm ci
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}

      - name: Install gateway dependencies
        run: |
          cd gateway
          npm ci
      
      - name: Install botapi dependencies
        run: |
          cd botapi
          npm ci

      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci

      - name: Install multiplayer dependencies
        run: |
          cd multiplayer
          npm ci

      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers

      - name: Run E2E tests
        run: |
          cd webapp
          npm run test:e2e
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish users
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users

  docker-push-authentication:
    name: Publish authentication image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish authentication
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-authentication
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: authentication

  docker-push-gateway:
    name: Publish gateway image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish gateway
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gateway
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gateway

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish webapp
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=/api

  docker-push-botapi:
    name: Publish botapi image
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish botapi
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-botapi
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: botapi

  docker-push-multiplayer:
    name: Publish multiplayer image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multiplayer
        uses: docker/build-push-action@v6
        with:
          context: ./multiplayer
          push: true
          tags: ghcr.io/arquisoft/${{ github.event.repository.name }}-multiplayer:latest

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish gamey
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey

  deploy:
    name: Deploy on VM
    runs-on: ubuntu-latest
    needs:
      - docker-push-users
      - docker-push-authentication
      - docker-push-gateway
      - docker-push-webapp
      - docker-push-gamey
      - docker-push-botapi
      - docker-push-multiplayer
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy_bundle/nginx/conf.d
          mkdir -p deploy_bundle/monitoring/grafana/provisioning/datasources
          mkdir -p deploy_bundle/monitoring/grafana/provisioning/dashboards

          cp docker-compose.deploy.yml deploy_bundle/docker-compose.yml
          cp nginx/conf.d/default.conf deploy_bundle/nginx/conf.d/default.conf
          cp monitoring/prometheus.yml deploy_bundle/monitoring/prometheus.yml
          cp -r monitoring/grafana/provisioning/datasources/* deploy_bundle/monitoring/grafana/provisioning/datasources/
          cp -r monitoring/grafana/provisioning/dashboards/* deploy_bundle/monitoring/grafana/provisioning/dashboards/

      - name: Upload deployment bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "deploy_bundle/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_components: 1
          overwrite: true

      - name: Start app on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            mkdir -p nginx/certs

            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_EXPIRES=${{ secrets.JWT_EXPIRES }}" >> .env

            docker compose pull
            docker compose up -d --remove-orphans

            docker container prune -f
            docker image prune -af
            docker builder prune -af

            docker system df
            df -h