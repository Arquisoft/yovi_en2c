global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'users-service'
    static_configs:
      - targets: ['users:3000']

  - job_name: 'gateway-service'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'gamey-service'
    static_configs:
      - targets: ['gamey:4000']

  - job_name: 'botapi-service'
    static_configs:
      - targets: ['botapi:4001']