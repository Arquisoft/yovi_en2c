global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'users-service'
    static_configs:
      - targets: ['users:3000']
    metrics_path: '/metrics'

  - job_name: 'gateway-service'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/metrics'

  - job_name: 'authentication-service'
    static_configs:
      - targets: ['authentication:5000']
    metrics_path: '/metrics'

  - job_name: 'multiplayer-service'
    static_configs:
      - targets: ['multiplayer:7000']
    metrics_path: '/metrics'

  - job_name: 'gamey-service'
    static_configs:
      - targets: ['gamey:4000']
    metrics_path: '/metrics'
